<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Caption</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #fafafa;
            min-height: 100vh;
            padding: 16px;
            color: #1a1a1a;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
        }

        .tagline {
            font-size: 12px;
            color: #666;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 0;
            border-bottom: 1px solid #e8e8e8;
            background: white;
            border-radius: 12px 12px 0 0;
        }

        .tab-button {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            color: #999;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-radius: 0;
        }

        .tab-button:hover {
            color: #666;
        }

        .tab-button.active {
            color: #1a1a1a;
            border-bottom-color: #1a1a1a;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .content-section {
            background: white;
            border-radius: 0 0 12px 12px;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #e8e8e8;
            border-top: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .label {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 14px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 1;
            background: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e8e8e8;
            margin-bottom: 16px;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-error {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .video-error-content {
            text-align: center;
        }

        .video-error-title {
            color: white;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .video-error-text {
            color: #bbb;
            font-size: 13px;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        button {
            padding: 16px 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            color: #333;
            white-space: nowrap;
            min-height: 44px;
            -webkit-appearance: none;
            appearance: none;
        }

        button:hover:not(:disabled) {
            background: #f5f5f5;
            border-color: #999;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-action {
            background: #1a1a1a;
            color: white;
            border-color: #1a1a1a;
            font-weight: 700;
            width: 100%;
        }

        .btn-action:hover:not(:disabled) {
            background: #333;
            border-color: #333;
        }

        .result-box {
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 8px;
            padding: 16px;
            min-height: 80px;
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 16px;
        }

        .result-header {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 13px;
            display: none;
            animation: slideIn 0.3s ease;
            border: 1px solid #fcc;
        }

        .error-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        canvas {
            display: none;
        }

        .hidden {
            display: none !important;
        }

        @media (min-width: 601px) {
            body {
                padding: 40px 20px;
            }

            h1 {
                font-size: 32px;
                margin-bottom: 8px;
            }

            .tagline {
                font-size: 15px;
            }

            .container {
                max-width: 700px;
            }

            .content-section {
                padding: 32px;
                margin-bottom: 40px;
            }

            .tab-button {
                padding: 18px 20px;
                font-size: 13px;
            }

            .label {
                font-size: 13px;
                margin-bottom: 16px;
            }

            button {
                padding: 11px 20px;
                font-size: 14px;
                font-weight: 500;
            }

            .btn-action {
                padding: 11px 20px;
                font-size: 14px;
                font-weight: 500;
            }

            .result-box {
                padding: 18px;
                font-size: 14px;
                margin-bottom: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Image Caption</h1>
            <p class="tagline">Generate captions from images using AI</p>
        </header>

        <div class="tabs">
            <button class="tab-button active" data-tab="capture-mode">Capture & Caption</button>
            <button class="tab-button" data-tab="stream-mode">Live Stream</button>
        </div>

        <!-- CAPTURE MODE -->
        <div id="capture-mode" class="tab-content active">
            <div class="content-section">
                <label class="label">Capture Frame</label>
                
                <div class="video-container">
                    <video id="videoStream" playsinline autoplay muted></video>
                    <div id="videoError" class="video-error hidden">
                        <div class="video-error-content">
                            <p class="video-error-title">Camera Access Denied</p>
                            <p class="video-error-text">Please enable camera permissions</p>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button id="captureBtn" class="btn-action">Capture Frame</button>
                </div>

                <div id="captureErrorMessage" class="error-message"></div>

                <div id="captureResultContainer" class="hidden">
                    <div class="result-header">Result</div>
                    <div id="captureResultText" class="result-box"></div>
                </div>
            </div>
        </div>

        <!-- STREAM MODE -->
        <div id="stream-mode" class="tab-content">
            <div class="content-section">
                <label class="label">Live Stream Captions</label>
                
                <div class="video-container">
                    <video id="videoStreamStream" playsinline autoplay muted></video>
                    <div id="videoErrorStream" class="video-error hidden">
                        <div class="video-error-content">
                            <p class="video-error-title">Camera Access Denied</p>
                            <p class="video-error-text">Please enable camera permissions</p>
                        </div>
                    </div>
                </div>

                <div class="controls">
                    <button id="streamStartBtn" class="btn-action">Start Stream</button>
                    <button id="streamStopBtn" class="btn-action" style="background: #666; border-color: #666; display: none;">Stop Stream</button>
                </div>

                <div id="streamErrorMessage" class="error-message"></div>

                <div id="streamResultContainer" class="hidden">
                    <div class="result-header">Live Result</div>
                    <div id="streamResultText" class="result-box"></div>
                </div>
            </div>
        </div>
    </div>

    <canvas id="canvasCapture" width="224" height="224"></canvas>
    <canvas id="canvasStream" width="224" height="224"></canvas>

    <script>
        // ============================================================================
        // GLOBAL STATE & DOM ELEMENTS
        // ============================================================================
        
        // Capture Mode Elements
        const videoStream = document.getElementById('videoStream');
        const captureBtn = document.getElementById('captureBtn');
        const captureResultContainer = document.getElementById('captureResultContainer');
        const captureResultText = document.getElementById('captureResultText');
        const captureErrorMessage = document.getElementById('captureErrorMessage');
        const canvasCapture = document.getElementById('canvasCapture');
        const videoError = document.getElementById('videoError');

        // Stream Mode Elements
        const videoStreamStream = document.getElementById('videoStreamStream');
        const streamStartBtn = document.getElementById('streamStartBtn');
        const streamStopBtn = document.getElementById('streamStopBtn');
        const streamResultContainer = document.getElementById('streamResultContainer');
        const streamResultText = document.getElementById('streamResultText');
        const streamErrorMessage = document.getElementById('streamErrorMessage');
        const canvasStream = document.getElementById('canvasStream');
        const videoErrorStream = document.getElementById('videoErrorStream');

        // Tab elements
        const tabButtons = document.querySelectorAll('.tab-button');
        const tabContents = document.querySelectorAll('.tab-content');
        
        // Backend API endpoint
        // const API_URL = 'http://localhost:5000/predict';
        const API_URL = 'http://192.168.0.100:5000/predict';

        // Stream mode state
        let isStreaming = false;
        let activeTab = 'capture-mode';
        
        // ============================================================================
        // TAB SWITCHING
        // ============================================================================
        
        tabButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                const tabName = e.target.getAttribute('data-tab');
                switchTab(tabName);
            });
        });

        function switchTab(tabName) {
            activeTab = tabName;

            // Update tab buttons
            tabButtons.forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab') === tabName);
            });

            // Update tab contents
            tabContents.forEach(content => {
                content.classList.toggle('active', content.getAttribute('id') === tabName);
            });

            // Stop streaming if switching away from stream mode
            if (tabName !== 'stream-mode' && isStreaming) {
                stopStreaming();
            }
        }
        
        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        
        window.addEventListener('load', initializeApp);
        
        async function initializeApp() {
            initializeCamera('capture');
            initializeCamera('stream');
        }
        
        async function initializeCamera(mode) {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                
                if (mode === 'capture') {
                    videoStream.srcObject = stream;
                    videoError.classList.add('hidden');
                    captureBtn.disabled = false;
                } else if (mode === 'stream') {
                    videoStreamStream.srcObject = stream;
                    videoErrorStream.classList.add('hidden');
                    streamStartBtn.disabled = false;
                }
            } catch (error) {
                console.error(`Camera access error (${mode}):`, error);
                const errorDiv = mode === 'capture' ? videoError : videoErrorStream;
                const btn = mode === 'capture' ? captureBtn : streamStartBtn;
                errorDiv.classList.remove('hidden');
                btn.disabled = true;
            }
        }
        
        // ============================================================================
        // CAPTURE MODE EVENT LISTENERS
        // ============================================================================
        
        captureBtn.addEventListener('click', async function() {
            try {
                captureResultContainer.classList.add('hidden');
                captureErrorMessage.classList.remove('show');
                captureBtn.disabled = true;
                
                const imageBlob = await captureFrame('capture');
                await sendToBackend(imageBlob, 'capture');
                
            } catch (error) {
                console.error('Capture error:', error);
                showError(error.message, 'capture');
            } finally {
                captureBtn.disabled = false;
            }
        });
        
        // ============================================================================
        // STREAM MODE EVENT LISTENERS
        // ============================================================================
        
        streamStartBtn.addEventListener('click', startStreaming);
        streamStopBtn.addEventListener('click', stopStreaming);
        
        // ============================================================================
        // STREAMING LOGIC
        // ============================================================================
        
        function startStreaming() {
            isStreaming = true;
            streamStartBtn.style.display = 'none';
            streamStopBtn.style.display = 'block';
            streamErrorMessage.classList.remove('show');
            streamResultContainer.classList.remove('hidden');
            streamResultText.textContent = 'Waiting for first result...';
            
            streamingLoop();
        }
        
        function stopStreaming() {
            isStreaming = false;
            streamStartBtn.style.display = 'block';
            streamStopBtn.style.display = 'none';
        }
        
        async function streamingLoop() {
            while (isStreaming) {
                try {
                    const imageBlob = await captureFrame('stream');
                    await sendToBackend(imageBlob, 'stream');
                } catch (error) {
                    console.error('Stream error:', error);
                    showError(error.message, 'stream');
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
            }
        }
        
        // ============================================================================
        // IMAGE CAPTURE LOGIC
        // ============================================================================
        
        async function captureFrame(mode) {
            return new Promise((resolve, reject) => {
                try {
                    const video = mode === 'capture' ? videoStream : videoStreamStream;
                    const canvas = mode === 'capture' ? canvasCapture : canvasStream;
                    
                    if (video.videoWidth === 0 || video.videoHeight === 0) {
                        reject(new Error('Video stream not ready. Please wait a moment and try again.'));
                        return;
                    }
                    
                    const ctx = canvas.getContext('2d');
                    const videoAspect = video.videoWidth / video.videoHeight;
                    const canvasSize = 224;
                    
                    let drawWidth, drawHeight, offsetX, offsetY;
                    
                    if (videoAspect > 1) {
                        drawHeight = canvasSize;
                        drawWidth = canvasSize * videoAspect;
                        offsetX = -(drawWidth - canvasSize) / 2;
                        offsetY = 0;
                    } else {
                        drawWidth = canvasSize;
                        drawHeight = canvasSize / videoAspect;
                        offsetX = 0;
                        offsetY = -(drawHeight - canvasSize) / 2;
                    }
                    
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvasSize, canvasSize);
                    ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
                    
                    canvas.toBlob(
                        (blob) => {
                            if (blob) {
                                resolve(blob);
                            } else {
                                reject(new Error('Failed to encode image as JPEG'));
                            }
                        },
                        'image/jpeg',
                        0.95
                    );
                    
                } catch (error) {
                    reject(error);
                }
            });
        }
        
        // ============================================================================
        // BACKEND COMMUNICATION
        // ============================================================================
        
        async function sendToBackend(imageBlob, mode) {
            try {
                const formData = new FormData();
                formData.append('image', imageBlob, 'capture.jpg');
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.caption) {
                    if (mode === 'capture') {
                        captureResultText.textContent = data.caption;
                        captureResultContainer.classList.remove('hidden');
                    } else if (mode === 'stream') {
                        const timestamp = new Date().toLocaleTimeString();
                        streamResultText.textContent = `[${timestamp}] ${data.caption}`;
                        streamResultContainer.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Invalid response from server: missing caption field');
                }
                
            } catch (error) {
                console.error('API error:', error);
                
                let message = error.message;
                if (error.message.includes('Failed to fetch')) {
                    message = 'Cannot reach the server. Make sure the backend is running.';
                }
                
                showError(message, mode);
            }
        }
        
        // ============================================================================
        // UTILITY FUNCTIONS
        // ============================================================================
        
        function showError(message, mode) {
            const errorElement = mode === 'capture' ? captureErrorMessage : streamErrorMessage;
            errorElement.textContent = message;
            errorElement.classList.add('show');
            setTimeout(() => errorElement.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
